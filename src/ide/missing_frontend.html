<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Peps IDE</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #101318;
        color: #f3f7ff;
        font-family: system-ui, sans-serif;
      }
      main {
        max-width: 720px;
        padding: 32px;
      }
      code,
      pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      pre {
        background: #181d25;
        border: 1px solid #2b3443;
        border-radius: 8px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Peps IDE frontend is not built yet</h1>
      <p>Build the browser app first, then restart the IDE server:</p>
      <pre>cd ide
npm install
npm run build
cd ..
cargo run --bin peps-ide</pre>
    </main>
  </body>
</html>
